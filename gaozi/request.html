```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta name="description"
          content="Request a GAOZI service including logistics, shopping assistance, business support, and student productivity solutions.">

    <meta name="author"
          content="Chisomaga Chiwuikem Eke">

    <title>GAOZI | Request Service</title>

    <link rel="icon"
          type="image/x-icon"
          href="favicon.ico">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="styles/normalize.css">

    <link rel="stylesheet"
          href="styles/small.css">

    <link rel="stylesheet"
          href="styles/larger.css">

    <script src="scripts/navigation.js"
            defer></script>

    <script src="scripts/request.js"
            defer></script>

</head>

<body>

<header>

    <div class="logo-container">

        <a href="index.html">

            <img src="images/gaozi-logo.webp"
                 alt="GAOZI Logo"
                 width="80"
                 height="80">

        </a>

        <span class="site-name">GAOZI</span>

    </div>

    <button id="menu"
            aria-label="Open Navigation Menu">
        ☰
    </button>

    <nav>

        <ul class="navigation">

            <li>
                <a href="index.html">
                    Home
                </a>
            </li>

            <li>
                <a href="services.html">
                    Services
                </a>
            </li>

            <li>
                <a href="hub.html">
                    Hub
                </a>
            </li>

        </ul>

    </nav>

</header>

<main>

    <section class="request-hero">

        <h1>Request a Service</h1>

        <p>
            Complete the form below and a GAOZI
            representative will contact you.
        </p>

    </section>

    <section class="request-form-section">

        <form method="get"
              action="confirmation.html">

            <fieldset>

                <legend>Personal Information</legend>

                <label>
                    Full Name*
                    <input
                        type="text"
                        name="fullname"
                        required>
                </label>

                <label>
                    Email Address*
                    <input
                        type="email"
                        name="email"
                        required>
                </label>

                <label>
                    Phone Number*
                    <input
                        type="tel"
                        name="phone"
                        required>
                </label>

            </fieldset>

            <fieldset>

                <legend>Service Details</legend>

                <label>
                    Selected Service

                    <input
                        type="text"
                        id="selected-service"
                        name="service"
                        readonly>
                </label>

                <label>
                    Preferred Date

                    <input
                        type="date"
                        name="service-date">
                </label>

                <label>
                    Additional Notes

                    <textarea
                        name="notes"
                        rows="5"></textarea>
                </label>

            </fieldset>

            <input
                type="submit"
                value="Submit Request"
                class="submit-btn">

        </form>

    </section>

</main>

<footer>

    <p>
        &copy; <span id="current-year"></span> GAOZI
    </p>

    <p>
        WDD 231 Final Project
    </p>

    <a href="attributions.html">
        Attributions
    </a>

    <br>

    <a href="#">
        Project Video
    </a>

</footer>

</body>
</html>
